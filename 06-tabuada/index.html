<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tabuada Estendida</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="./script.js" defer></script>
</head>
<body>

  <div class="container">

    <a href="../index.html">← Voltar</a>

    <h1>Tabuada Estendida</h1>
    <p>Informe um número para gerar as operações de 1 a 10.</p>

    <div class="campo">
      <label>Número</label>
      <input type="number" id="numero" placeholder="Ex: 7"/>
    </div>

    <button onclick="gerarTabuada()">Gerar Tabuada</button>

    <div class="resultado">
      <p class="resultado-titulo">Resultado</p>
      <div class="tabela-wrapper">
        <table>
          <thead>
            <tr>
              <th>N</th>
              <th>Adição</th>
              <th>Subtração</th>
              <th>Multiplicação</th>
              <th>Divisão</th>
            </tr>
          </thead>
          <tbody id="tabela-corpo">
          </tbody>
        </table>
      </div>
    </div>

  </div>

</body>
</html>
