<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulador de Financiamento</title>
  <link rel="stylesheet" href="./style.css"/>
  <script src="./script.js" defer></script>
</head>
<body>

  <div class="container">

    <a href="../index.html">← Voltar</a>

    <h1>Simulador de<br><span>Financiamento</span></h1>
    <p>Informe os dados para simular as parcelas com juros compostos.</p>

    <div class="grid">
      <div class="campo">
        <label>Valor Total (R$)</label>
        <input type="number" id="valorTotal" placeholder="Ex: 12000"/>
      </div>
      <div class="campo">
        <label>Taxa de Juros (% ao mês)</label>
        <input type="number" id="taxa" placeholder="Ex: 1.5" step="0.1"/>
      </div>
      <div class="campo">
        <label>Número de Parcelas</label>
        <input type="number" id="parcelas" placeholder="Ex: 12"/>
      </div>
    </div>

    <button onclick="simularFinanciamento()">Simular Financiamento</button>

    <div class="resultado">
      <p class="resultado-titulo">Resultado</p>
      <div class="tabela-wrapper">
        <table>
          <thead>
            <tr>
              <th>Mês</th>
              <th>Parcela</th>
              <th>Juros do Mês</th>
              <th>Total do Mês</th>
              <th>Saldo Devedor</th>
            </tr>
          </thead>
          <tbody id="tabela-corpo">


          </tbody>
        </table>
      </div>
    </div>

  </div>

</body>
</html>
